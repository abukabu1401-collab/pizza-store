<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>✏️ Редактировать пиццу</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✏️ Редактировать пиццу</h1>
            <p>{{ pizza.name }}</p>
            <div class="nav">
                <a href="/">Главная</a>
                <a href="/login">Вход</a>
                <a href="/register">Регистрация</a>
            </div>
        </div>
        
        <div class="form-card">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    <div class="flash-message flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endwith %}
            
            <!-- novalidate отключает HTML5 валидацию -->
            <form method="post" novalidate>
                <div class="form-group">
                    <label>Название пиццы</label>
                    <input type="text" name="name" value="{{ pizza.name }}">
                </div>
                
                <div class="form-group">
                    <label>Цена (руб)</label>
                    <input type="text" name="price" value="{{ pizza.price }}">
                </div>
                
                <div class="form-group">
                    <label>Размер (см)</label>
                    <select name="size">
                        <option value="25" {% if pizza.size == 25 %}selected{% endif %}>25 см (маленькая)</option>
                        <option value="30" {% if pizza.size == 30 %}selected{% endif %}>30 см (средняя)</option>
                        <option value="35" {% if pizza.size == 35 %}selected{% endif %}>35 см (большая)</option>
                        <option value="40" {% if pizza.size == 40 %}selected{% endif %}>40 см (семейная)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Ингредиенты</label>
                    <textarea name="ingredients" rows="3">{{ pizza.ingridientes | join(', ') }}</textarea>
                    <small style="color: #666;">Ингредиенты перечисляйте через запятую</small>
                </div>
                
                <button type="submit" class="btn">💾 Сохранить изменения</button>
            </form>
            
            <hr style="margin: 20px 0;">
            
            <form action="/delete_pizza/{{ pizza.name }}" method="get" onsubmit="return confirm('Точно удалить пиццу {{ pizza.name }}?')">
                <button type="submit" class="btn" style="background: #dc3545;">🗑️ Удалить пиццу</button>
            </form>
            
            <a href="/" class="back-link">← На главную</a>
        </div>
        
        <div class="footer">
            <p>Пиццерия | Редактирование пиццы</p>
        </div>
    </div>
</body>
</html>
