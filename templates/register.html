<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>📝 Регистрация - Пиццерия</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .form-card {
            max-width: 400px;
        }
        .login-link {
            text-align: center;
            margin-top: 15px;
        }
        .login-link a {
            color: #ff6b35;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 Регистрация</h1>
            <p>Создайте аккаунт в Пиццерии</p>
            <div class="nav">
                <a href="/">Главная</a>
                <a href="/login">Вход</a>
                <a href="/register">Регистрация</a>
            </div>
        </div>
        
        <div class="form-card">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    <div class="flash-message flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endwith %}
            
            <form method="post" novalidate>
                <div class="form-group">
                    <label>Имя пользователя *</label>
                    <input type="text" name="username" placeholder="Придумайте логин">
                </div>
                
                <div class="form-group">
                    <label>Email *</label>
                    <input type="text" name="email" placeholder="Ваш email">
                </div>
                
                <div class="form-group">
                    <label>Пароль *</label>
                    <input type="password" name="password" placeholder="Придумайте пароль">
                </div>
                
                <div class="form-group">
                    <label>Подтверждение пароля *</label>
                    <input type="password" name="confirm_password" placeholder="Повторите пароль">
                </div>
                
                <div class="form-group">
                    <label>Роль</label>
                    <select name="role">
                        <option value="user">👤 Пользователь</option>
                        <option value="admin">👑 Администратор</option>
                    </select>
                </div>
                
                <button type="submit" class="btn">📝 Зарегистрироваться</button>
            </form>
            
            <div class="login-link">
                Уже есть аккаунт? <a href="/login">Войти</a>
            </div>
            
            <a href="/" class="back-link">← На главную</a>
        </div>
        
        <div class="footer">
            <p>Пиццерия | Страница регистрации</p>
        </div>
    </div>
</body>
</html>
